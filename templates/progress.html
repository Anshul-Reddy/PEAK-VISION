<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}"
</head>
<body>
    <h1>Progress Tracker</h1>
    <h3>Total Questions: {{ total_questions }}</h3>
    <h3>Completed Questions: {{ completed_questions }}</h3>
    <h3>Pending Questions: {{ pending_questions }}</h3>
    <h3>Progress: {{ progress_percentage}}%</h3>
    <div class="progress-bar">
        <div class="progress-fill"style="width:{{ progress_percentage }}%">
        </div>
    </div>
</body>
</html>
