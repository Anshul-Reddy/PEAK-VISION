<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question</title>
</head>
<body>
    <h1>Add Question</h1>
    <h3>{{ message }}</h3>
    <form method="POST">
        <intput type="text" name="subject" placeholder="Enter Subject">
        <br><br>
        <textarea name="question" rows="8" cols="50" placeholder="Enter Question"></textarea>
        <br><br>
        <select name="difficulty">
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
        </select>
        <br><br>
        <button type="submit">Save Question</button>
    </form>
</body>
</html>
