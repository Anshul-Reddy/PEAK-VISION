<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="POST">

        <input type="text" name="subject" value="{{ note[1] }}">
        <br><br>

        <textarea name="note" rows="10" cold="50">
            {{ note[2] }}
        </textarea>
        <br><br>

        <button type="submit">Update Note</button>
    </form>
</body>
</html>
